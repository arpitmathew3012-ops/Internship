<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Friend Circle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Quicksand', sans-serif;
      background: url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d') no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 30px 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      color: #fff;
    }

    h2 {
      font-weight: 700;
      margin-bottom: 25px;
      color: chocolate;
    }

    .friend-list {
      list-style: none;
      padding: 0;
    }

    .friend-list li {
      background-color: black;
      padding: 12px 18px;
      margin: 10px 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      transition: background 0.3s ease;
    }

    .friend-list li:hover {
      background-color: rgba(255, 255, 255, 0.3);
    }

    .friend-icon {
      font-size: 20px;
    }

    .back-btn {
      margin-top: 25px;
      padding: 10px 22px;
      font-size: 16px;
      border-radius: 30px;
      background-color: #28a745;
      border: none;
      color: white;
      transition: background 0.3s ease;
    }

    .back-btn:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <h2>My Friend Circle</h2>
    <ul class="friend-list">
      <li><span class="friend-icon">👤</span> Abhinav</li>
      <li><span class="friend-icon">👤</span> Ben</li>
      <li><span class="friend-icon">👤</span> Abhay</li>
      <li><span class="friend-icon">👤</span> Abraham</li>
    </ul>
     <div class="back-link">
      <a href="index.html" class="btn btn-outline-primary">← Back to Home</a>
    </div>
  </div>
</body>
</html>
