<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <title>Student Details</title>
    <style>
    .error {
      color: red;
      font-size: 14px;
    }
  </style>
</head>
<body>
    <div class="container mt-5">
    <h3 class="text-center">STUDENT DETAILS</h3>
    <form class="form-group mt-5" onsubmit="return validateForm()">
  <div class="row mb-5">
    <div class="col-2">
      <label for="name" class="form-label">Name</label>
    </div>
    <div class="col-sm-6">
      <input type="text" class="form-control" id="name">
    </div>
    <span id="nameError" class="error"></span>
  </div>

  <div class="row mb-5">
    <div class="col-2">
      <label for="phone" class="form-label">Phone</label>
    </div>
    <div class="col-sm-4">
      <input type="text" class="form-control" id="phone">
    </div>
    <span id="phoneError" class="error"></span>
  </div>

  <div class="row mb-5">
    <div class="col-sm-6 d-flex align-items-start">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="terms">
        <label class="form-check-label" for="terms">Accept Terms and Conditions</label>
      </div>
    </div>
    <span id="termsError" class="error"></span>
  </div>

  <button type="submit" class="btn btn-primary">Submit</button>
  </form>
</div>
<script>
function validateForm() {
    document.getElementById("nameError").innerText = "";
    document.getElementById("phoneError").innerText = "";
    document.getElementById("termsError").innerText = "";


    let valid = true;

    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const termsChecked = document.getElementById("terms").checked;

    if (name === "") {
        document.getElementById("nameError").innerText = "Name is required";
        valid = false;
    }

    if (phone === "") {
        document.getElementById("phoneError").innerText = "Phone is required";
        valid = false;
    } else if (!/^\d{10}$/.test(phone)) {
        document.getElementById("phoneError").innerText = "Enter a valid 10-digit phone number";
        valid = false;
    }
    if (!termsChecked) {
      document.getElementById("termsError").innerText = "You must accept the terms.";
      valid = false;
    }

    return valid;
}
</script>
</body>
</html>
