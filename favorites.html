<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Favourites</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #a1ffce, #faffd1);
      font-family: 'Segoe UI', sans-serif;
      padding: 60px 20px;
    }
    .container {
      max-width: 800px;
      background: plum;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }
    h3 {
      color: #2c3e50;
      margin-bottom: 30px;
    }
    .favourite-item {
      font-size: 1.2rem;
      margin-bottom: 20px;
    }
    .favourite-item i {
      color: #00796b;
      margin-right: 10px;
    }
    .btn-back {
      margin-top: 30px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container text-center">
    <h3><i class="bi bi-stars"></i> My Favourites</h3>

    <div class="favourite-item">
      <i class="bi bi-film"></i> <strong>Movie:</strong> Interstellar
      <div class="ratio ratio-16x9 mt-2">
        <iframe src="https://www.youtube.com/embed/zSWdZVtXT7E" title="Interstellar Trailer" allowfullscreen></iframe>
      </div>
    </div>

   <div class="favourite-item mt-4">
        <i class="bi bi-music-note-beamed"></i> <strong>Song:</strong> Not Like Us – Kendrick Lamar
        <br><br>
        <audio controls>
                <source src="Not Like Us.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
        </audio>
</div>

    <a href="index.html" class="btn btn-outline-primary btn-back mt-4">
      <i class="bi bi-arrow-left-circle"></i> Back to Home
    </a>
  </div>
</body>
</html>
