<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
    <style>
    .error {
      color: red;
      font-size: 14px;
    }
  </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>
<body>
    <div class="container mt-5">
        <h3 class="text-center">REGISTRATION FORM</h3>
         <form class="form-group mt-5" onsubmit=" return validateForm()">
        <div class="row mb-3">
                <div class="col-2">
                    <label for="exampleInputName1" class="form-label">Name</label>
                </div>
                <div class="col-sm-6">
                    <input type="name" class="form-control" id="name">
                </div>
                <span id="nameError" class="error"></span>
            </div>
            <div class="row mb-3">
                <div class="col-2">
                    <label for="exampleInputEmail1" class="form-label">Email address</label>
                </div>
                <div class="col-sm-6">
                    <input type="email" class="form-control" id="email">
                </div>
                <span id="emailError" class="error"></span>
              </div>
<div class="row mb-6">
    <label class="col-sm-2 col-form-label">Gender</label>
    <div class="col-sm-10 d-flex align-items-center">
        <div class="form-check me-3">
 <div class="form-check form-check-inline">
  <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
  <label class="form-check-label" for="radioDefault1">Male</label>
  </div>
<div class="form-check form-check-inline">
  <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
  <label class="form-check-label" for="radioDefault1">Female</label>
  </div>
</div>
</div>
</div> 
<div class="mb-6">
  <div class="row mt-3">
        <label class="col-2 col-form-label">Qualification</label>
        <div class="col-sm-10 d-flex align-items-center">
          <div class="form-check me-3">
  <div class="form-check form-check-inline">
    <input class="form-check-input" type="checkbox" id="exampleCheck1">
    <label class="form-check-label" for="exampleCheck1">10<sup>th</sup></label>
  </div>
  <div class="form-check form-check-inline">
    <input class="form-check-input" type="checkbox" id="exampleCheck1">
    <label class="form-check-label" for="exampleCheck1">12<sup>th</sup></label>
  </div>
  <div class="form-check form-check-inline">
    <input class="form-check-input" type="checkbox" id="exampleCheck1">
    <label class="form-check-label" for="exampleCheck1">UG</label>
  </div>
  <div class="form-check form-check-inline">
    <input class="form-check-input" type="checkbox" id="exampleCheck1">
    <label class="form-check-label" for="exampleCheck1">PG</label>
  </div>
  <a href="validation.html" class="btn btn-primary">submit</a>
</div>
</div>
</div>
</div> 

<div class="row mb-3">
  <div class="mt-3">
    <label class="col-sm-2 col-form-label">Disrict</label>
  </div>
</div> 
<div class="row mb-3">
  <div class="mt-3">
<div class="col text-center">
<button type="submit" class="btn btn-primary">Submit</button>
</div>
</div>
</div>
</form>
</div>
    <script>
        function validateForm(){
            document.getElementById("nameError").innerText="";
            document.getElementById("emailError").innerText="";

            let valid=true;

            const name=document.getElementById("name").value.trim();
            const email=document.getElementById("email").value.trim();
            const emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

            if(name === ""){
             
                document.getElementById("nameError").innerText="Name is required";
                valid=false;
            }
            if(email === ""){
                document.getElementById("emailError").innerText="Email is required";
                valid=false;
            }
            else if(!email.match(emailPattern)){
                document.getElementById("emailError").innerText="Enter a valid email";
                valid=false;
            }
            
            return valid;
         }
    </script>
</body>
</html>
