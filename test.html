<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Enrollment Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .form-section {
      display: none;
    }
    .error {
      color: red;
      font-size: 14px;
    }
    body {
      background-color: coral;
    }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center">STUDENT ENROLLMENT FORM</h1>

    <div class="row mt-4 mb-3">
      <div class="col text-center">
        <button class="btn btn-light me-3" onclick="showForm('studentFormSection')">STUDENT DETAILS</button>
        <button class="btn btn-light me-3" onclick="showForm('parentFormSection')">PARENT DETAILS</button>
      </div>
    </div>

    <div class="row">
      <div id="studentFormSection" class="col-md-6 form-section">
      <div class="bg-white p-3 rounded shadow">
      <h3 class="text-center">STUDENT DETAILS</h3>
      <form class="form-group mt-4" onsubmit="return false;">
        <div class="row mb-3">
          <div class="col-2">
            <label for="studentName" class="form-label">Name</label>
          </div>
          <div class="col-sm-6">
            <input type="text" class="form-control" id="studentName" oninput="validateAll()">
          </div>
          <span id="studentNameError" class="error"></span>
        </div>

        <div class="row mb-3">
          <div class="col-2">
            <label for="studentPhone" class="form-label">Phone</label>
          </div>
          <div class="col-sm-4">
            <input type="text" class="form-control" id="studentPhone" oninput="validateAll()">
          </div>
          <span id="studentPhoneError" class="error"></span>
        </div>

        <div class="row mb-3">
          <div class="col-sm-6 d-flex align-items-start">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="studentTerms" onchange="validateAll()">
              <label class="form-check-label" for="studentTerms">Accept Terms and Conditions</label>
            </div>
          </div>
          <span id="studentTermsError" class="error"></span>
        </div>
      </form>
    </div>
    </div>

    <div id="parentFormSection" class="col-md-6 form-section">
       <div class="bg-white p-3 rounded shadow">
      <h3 class="text-center">PARENT DETAILS</h3>
      <form class="form-group mt-4" onsubmit="return false;">
        <div class="row mb-3">
          <div class="col-2">
            <label for="parentName" class="form-label">Name</label>
          </div>
          <div class="col-sm-6">
            <input type="text" class="form-control" id="parentName" oninput="validateAll()">
          </div>
          <span id="parentNameError" class="error"></span>
        </div>

        <div class="row mb-3">
          <div class="col-2">
            <label for="parentPhone" class="form-label">Phone</label>
          </div>
          <div class="col-sm-4">
            <input type="text" class="form-control" id="parentPhone" oninput="validateAll()">
          </div>
          <span id="parentPhoneError" class="error"></span>
        </div>

        <div class="row mb-3">
          <div class="col-sm-6 d-flex align-items-start">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="parentTerms" oninput="validateAll()">
              <label class="form-check-label" for="parentTerms">Accept Terms and Conditions</label>
            </div>
          </div>
          <span id="parentTermsError" class="error"></span>
        </div>
      </form>
    </div>
    </div>

    <div class="text-center mt-4">
      <button id="submitBtn" class="btn btn-success" onclick="submitForm()">SUBMIT</button>
    </div>
  </div>

  <script>
    function showForm(formId) {
      document.getElementById(formId).style.display = "block";
    }

   function validateAll() {
  let valid = true;

  document.getElementById("studentNameError").innerText = "";
  document.getElementById("studentPhoneError").innerText = "";
  document.getElementById("studentTermsError").innerText = "";
  document.getElementById("parentNameError").innerText = "";
  document.getElementById("parentPhoneError").innerText = "";
  document.getElementById("parentTermsError").innerText = "";
  
    const studentName = document.getElementById("studentName").value.trim();
    const studentPhone = document.getElementById("studentPhone").value.trim();
    const studentTerms = document.getElementById("studentTerms").checked;

    if (studentName === "") {
      document.getElementById("studentNameError").innerText = "Name is required";
      valid = false;
    }

    if (!/^\d{10}$/.test(studentPhone)) {
      document.getElementById("studentPhoneError").innerText = "Enter a valid 10-digit phone number";
      valid = false;
    }

    if (!studentTerms) {
      document.getElementById("studentTermsError").innerText = "You must accept the terms.";
      valid = false;
  }
    const parentName = document.getElementById("parentName").value.trim();
    const parentPhone = document.getElementById("parentPhone").value.trim();
    const parentTerms = document.getElementById("parentTerms").checked;

    if (parentName === "") {
      document.getElementById("parentNameError").innerText = "Name is required";
      valid = false;
    }

    if (!/^\d{10}$/.test(parentPhone)) {
      document.getElementById("parentPhoneError").innerText = "Enter a valid 10-digit phone number";
      valid = false;
    }

    if (!parentTerms) {
      document.getElementById("parentTermsError").innerText = "You must accept the terms.";
      valid = false;
    }
    return valid;
  }
function submitForm() {
  if(validateAll())
{
    alert("Form submitted successfully!");
    window.location.href = "welcome.html";
}
else
  {
    alert("Please complete both Student and Parent details correctly before submitting.");
  }
}

</script>
</body>
</html>
